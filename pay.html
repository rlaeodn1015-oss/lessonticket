<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스승님 | 안전 결제 시스템</title>
    <script src="https://js.bootpay.co.kr/bootpay-4.3.4.min.js" type="application/javascript"></script>
    <style>
        body { margin: 0; background-color: #F8FAFC; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Pretendard', sans-serif; }
        .loader-container { text-align: center; }
        .loader { width: 48px; height: 48px; border: 5px solid #0066FF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; box-sizing: border-box; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .msg { margin-top: 20px; font-weight: 800; color: #0F172A; font-size: 18px; }
        .sub-msg { font-size: 13px; color: #64748B; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="loader"></div>
        <p id="msg" class="msg">안전 결제 모듈을 호출하고 있습니다</p>
        <p class="sub-msg">잠시만 기다려 주세요...</p>
    </div>

    <script>
        async function startPayment() {
            const params = new URLSearchParams(window.location.search);
            
            const price = parseInt(params.get('price')) || 0;
            const userName = params.get('userName') || "고객";
            const userPhone = params.get('userPhone') || "-";
            const proName = params.get('proName') || "-";
            const proPhone = params.get('proPhone') || "-";
            const lessonCount = params.get('lessonCount') || "회차미정";
            const requestId = params.get('requestId') || `TKT_${Date.now()}`;

            const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzfqHWO3J48sE3XbfOvWgXUkULhIh3MdETumpw9GbFNeCr-R3F392bH7Sj6ZVcs1VZYhw/exec";

            if (price <= 0) {
                document.getElementById('msg').innerText = "결제 금액이 올바르지 않습니다.";
                return;
            }

            // [1단계] 결제창 띄우기 전, 시트에 '결제 대기' 상태로 한 줄 추가
            try {
                await fetch(GOOGLE_SHEET_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "addLessonTicket",
                        userName: userName,
                        userPhone: userPhone,
                        proName: proName,
                        lessonCount: lessonCount,
                        proPhone: proPhone,
                        price: price,
                        status: "결제 대기", // 초기 상태
                        requestId: requestId
                    })
                });
            } catch (e) {
                console.error("초기 데이터 기록 실패:", e);
            }

            // [2단계] 부트페이 결제창 호출
            try {
                const response = await Bootpay.requestPayment({
                    "application_id": "67ecd171d9af4e5c6d21736b",
                    "price": price,
                    "order_name": `[추가레슨권] ${proName} - ${lessonCount}`,
                    "order_id": requestId,
                    "pg": "nicepay",
                    "method": "card",
                    "user": { "username": userName, "phone": userPhone },
                    "extra": { "open_type": "iframe" }
                });

                if (response.event === 'done') {
                    document.getElementById('msg').innerText = "결제 완료! 데이터를 업데이트 중입니다...";

                    // [3단계] 결제 성공 시, requestId를 찾아 '미지급(결제완료)'로 업데이트
                    await fetch(GOOGLE_SHEET_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            action: "updateTicketStatus",
                            requestId: requestId,
                            status: "미지급(결제완료)",
                            payMethod: response.data.method_origin_name || "카드"
                        })
                    });
                    
                    location.href = "success.html";
                }
            } catch (e) {
                alert("결제 진행 중 오류가 발생했습니다.");
                window.history.back();
            }
        }

        window.onload = startPayment;
    </script>
</body>
</html>
