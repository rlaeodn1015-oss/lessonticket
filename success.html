<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 완료 - 스승님</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-5">

    <div class="max-w-sm w-full bg-white rounded-[2.5rem] shadow-xl p-10 text-center border border-slate-100">
        <!-- 성공 아이콘 -->
        <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-2xl font-black text-slate-800 mb-2">결제가 완료되었습니다!</h1>
        
        <!-- 결제 금액 노출 (UX 개선) -->
        <div id="priceDisplay" class="hidden mb-4 py-2 px-4 bg-slate-50 rounded-xl inline-block">
            <span class="text-blue-600 font-black text-lg" id="finalPrice">0</span>
            <span class="text-slate-600 font-bold">원이 결제되었습니다.</span>
        </div>

        <p class="text-slate-500 font-bold mb-8 leading-relaxed">
            이제 스승님 앱에서<br>레슨 일정을 확정해보세요.
        </p>

        <!-- 액션 버튼 -->
        <div class="space-y-3">
            <a href="https://ssnim.com/install.html" 
               class="block w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all text-lg text-center">
                스승님 앱 설치하기
            </a>
            <button onclick="closeWindow()" class="block w-full bg-slate-100 text-slate-600 font-black py-4 rounded-2xl hover:bg-slate-200 transition-all text-sm">
                창 닫기
            </button>
        </div>

        <p class="text-[10px] text-slate-400 mt-8 font-medium">
            문의사항: 스승님 고객센터 (카카오톡 채널)
        </p>
    </div>

    <script>
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const requestId = params.get('requestId');
        const price = params.get('price');

        // 1. 금액 표시 로직
        if (price) {
            document.getElementById('priceDisplay').classList.remove('hidden');
            document.getElementById('finalPrice').innerText = Number(price).toLocaleString();
        }

        // 2. 구글 시트 업데이트 로직 (보험용)
        // ※ 주의: 어제 생성한 구글 앱스 스크립트 실행 URL을 아래에 넣으세요.
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzfqHWO3J48sE3XbfOvWgXUkULhIh3MdETumpw9GbFNeCr-R3F392bH7Sj6ZVcs1VZYhw/exec";

        if (requestId && params.get('retry') === '1') {
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    action: "updatePayment",
                    requestId: requestId,
                    paymentStatus: "결제 완료",
                    paidAmount: price
                })
            });
        }
    };

    // 3. 창 닫기 로직 (카톡 인앱 브라우저 대응)
    function closeWindow() {
        const userAgent = navigator.userAgent.toLowerCase();

        if (userAgent.includes('kakao')) {
            location.href = 'kakaotalk://inappbrowser/close';
            return;
        }

        window.open('', '_self', ''); 
        window.close();
        
        // 브라우저 보안으로 안 닫힐 경우 카톡 채널로 리다이렉트
        setTimeout(() => {
            location.href = "https://pf.kakao.com/_kxawRn/chat";
        }, 300);
    }

    // 유저가 충분히 인지할 수 있도록 15초 후 자동 닫기
    setTimeout(closeWindow, 15000); 
    </script>

</body>
</html>
