    <style>
        :root {
            --brand-blue: #0066FF;
            --premium-navy: #0F172A;
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #F1F5F9; 
            color: #1E293B;
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 럭셔리한 그림자 효과 */
        .soft-shadow { box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.04); }
        .premium-shadow { box-shadow: 0 20px 50px -12px rgba(0, 102, 255, 0.15); }
        
        /* 그라데이션 및 글래스 효과 */
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .gradient-dark { background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%); }
        .gradient-blue { background: linear-gradient(135deg, #0066FF 0%, #004dc2 100%); }
        
        /* 스크롤바 숨기기 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 탭 디자인 고도화 */
        .pro-tab { 
            position: relative; 
            transition: all 0.3s ease;
            padding: 1rem 0.5rem;
            min-width: 60px;
            text-align: center;
        }
        .tab-active { color: var(--brand-blue); font-weight: 900; transform: scale(1.1); }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--brand-blue);
            border-radius: 50%;
        }
        
        /* 상품 카드 세련미 추가 */
        .plan-card { 
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
            cursor: pointer; 
            border: 1.5px solid #F1F5F9; 
        }
        .plan-card:active { transform: scale(0.97); }
        .plan-card.selected { 
            border-color: var(--brand-blue); 
            background-color: #F0F7FF;
            box-shadow: 0 15px 30px -10px rgba(0, 102, 255, 0.12);
        }

        /* 하단 고정 바 디자인 */
        .sticky-bottom { 
            position: fixed; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%);
            width: 100%;
            max-width: 576px;
            z-index: 100; 
            background: white; 
            padding: 1.25rem 1.5rem 2rem 1.5rem; 
            border-top: 1px solid #F1F5F9;
            border-radius: 2rem 2rem 0 0;
            box-shadow: 0 -15px 40px rgba(0,0,0,0.05); 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease forwards; }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(0, 102, 255, 0.4); }
            100% { box-shadow: 0 0 0 20px rgba(0, 102, 255, 0); }
        }
        .btn-ripple { animation: ripple 1.5s infinite; }
    </style>
</head>

        let currentId = 1;
        let selectedPlan = null;

        function initTabs() {
            const container = document.getElementById('tab-scroll');
            container.innerHTML = prosData.map(pro => `
                <button onclick="selectPro(${pro.id}, this)" id="tab-${pro.id}" class="pro-tab flex-shrink-0 text-sm font-black whitespace-nowrap ${pro.id === 1 ? 'tab-active' : 'text-slate-400'}">
                    ${pro.name.split(' ')[0]}
                </button>
            `).join('');
        }

        function selectPro(id, element) {
            currentId = id;
            selectedPlan = null;
            
            // 탭 중앙 정렬 애니메이션
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            // UI 초기화
            document.getElementById('total-price-display').innerText = '0원';
            const payBtn = document.getElementById('pay-button');
            payBtn.innerText = "상품을 선택해주세요";
            payBtn.className = "flex-[1.8] bg-slate-100 text-slate-400 py-4.5 rounded-2xl font-black text-[17px] transition-all cursor-not-allowed";
            payBtn.classList.remove('btn-ripple', 'gradient-blue', 'text-white', 'premium-shadow');

            document.querySelectorAll('.pro-tab').forEach(t => {
                t.classList.remove('tab-active');
                t.classList.add('text-slate-400');
            });
            document.getElementById('tab-' + id).classList.add('tab-active');
            document.getElementById('tab-' + id).classList.remove('text-slate-400');

            // 프로필 섹션 리로딩 효과
            const profileContainer = document.getElementById('pro-profile-container');
            profileContainer.style.opacity = '0';
            profileContainer.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                const pro = prosData.find(p => p.id === id);
                document.getElementById('pro-img').src = pro.img;
                document.getElementById('pro-name').innerText = pro.name;
                document.getElementById('pro-intro').innerText = pro.intro;
                document.getElementById('pro-specialty').innerText = pro.specialty;
                document.getElementById('pro-rating').innerText = pro.rating.toFixed(1);
                document.getElementById('pro-students').innerText = pro.review + "명";

                renderPlans(pro.price);
                renderReview(pro.highlight);

                profileContainer.style.opacity = '1';
                profileContainer.style.transform = 'translateY(0)';
            }, 150);
        }

        function renderPlans(basePrice) {
            const options = getPriceOptions(basePrice);
            const container = document.getElementById('plan-container');
            container.innerHTML = Object.entries(options).map(([title, data], index) => `
                <div onclick="selectPlan('${title}', ${data.price})" id="plan-${title.replace(/ /g, '')}" class="plan-card bg-white p-6 rounded-[2rem] flex justify-between items-center soft-shadow animate-fade" style="animation-delay: ${index * 0.05}s">
                    <div class="text-left">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-2 py-0.5 rounded uppercase tracking-widest border border-blue-100">${data.tag}</span>
                        </div>
                        <h4 class="text-[17px] font-black text-slate-800 tracking-tight">${title}</h4>
                        <p class="text-[11px] text-slate-400 font-bold mt-1">${data.desc}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black text-slate-900 tracking-tighter">${data.price.toLocaleString()}원</p>
                    </div>
                </div>
            `).join('');
        }

        function renderReview(highlight) {
            document.getElementById('review-container').innerHTML = `
                <div class="animate-fade">
                    <p class="text-[15px] font-bold text-blue-100 italic leading-relaxed mb-4">"${highlight}"</p>
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center">
                            <i class="fa-solid fa-user text-[10px] text-blue-400"></i>
                        </div>
                        <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Verified Student Review</span>
                    </div>
                </div>
            `;
        }

        function selectPlan(title, price) {
            selectedPlan = { title, price };
            document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('plan-' + title.replace(/ /g, '')).classList.add('selected');
            
            document.getElementById('total-price-display').innerText = price.toLocaleString() + '원';
            
            const payBtn = document.getElementById('pay-button');
            payBtn.innerText = "안전 결제 계속하기";
            payBtn.className = "flex-[1.8] gradient-blue text-white py-4.5 rounded-2xl font-black text-[17px] premium-shadow active:scale-95 transition-all btn-ripple";
        }

        function goPay() {
            if (!selectedPlan) return;
            const pro = prosData.find(p => p.id === currentId);
            const requestId = `SNIM_${currentId}_${selectedPlan.title.replace(/ /g, '_')}_${Date.now()}`;
            const payUrl = `https://rlaeodn1015-oss.github.io/ssnim-request-landing/pay.html?price=${selectedPlan.price}&name=${encodeURIComponent(pro.name + ' ' + selectedPlan.title)}&requestId=${requestId}`;
            location.href = payUrl;
        }

        window.onload = () => {
            initTabs();
            selectPro(1, document.getElementById('tab-1'));
        };
    </script>
</body>
</html>
